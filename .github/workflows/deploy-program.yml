name: Build & Deploy Solana Program

on:
  workflow_dispatch:   # запуск вручную с GitHub UI
  push:
    paths:
      - 'vendchain-contracts/programs/**'   # автозапуск при изменении программы

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Rust + SBF toolchain
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- -y
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --force
          avm install 0.32.0
          avm use 0.32.0

      - name: Set up deployer keypair
        run: |
          mkdir -p ~/.config/solana
          echo '${{ secrets.DEPLOYER_KEYPAIR }}' > ~/.config/solana/id.json
          solana config set --url devnet
          solana config set --keypair ~/.config/solana/id.json
          echo "Deployer: $(solana address)"
          echo "Balance: $(solana balance)"

      - name: Set up program keypair
        run: |
          mkdir -p vendchain-contracts/target/deploy
          echo '${{ secrets.PROGRAM_KEYPAIR }}' > vendchain-contracts/target/deploy/vendchain_contracts-keypair.json
          echo "Program keypair set"

      - name: Airdrop SOL for deploy
        run: |
          HELIUS="https://devnet.helius-rpc.com/?api-key=${{ secrets.HELIUS_API_KEY }}"
          solana airdrop 2 --url "$HELIUS" || solana airdrop 2 --url devnet || true
          sleep 5
          solana airdrop 2 --url "$HELIUS" || solana airdrop 2 --url devnet || true
          sleep 5
          echo "Balance after airdrop: $(solana balance)"

      - name: Build program
        working-directory: vendchain-contracts
        run: anchor build

      - name: Set up vend-machine keypair
        run: |
          echo '${{ secrets.VEND_MACHINE_KEYPAIR }}' > vendchain-contracts/target/deploy/vend_machine-keypair.json
          echo "Vend-machine keypair set"

      - name: Deploy vendchain_contracts program
        working-directory: vendchain-contracts
        run: |
          anchor deploy \
            --program-name vendchain_contracts \
            --provider.cluster devnet \
            --provider.wallet ~/.config/solana/id.json \
            --no-idl
          echo "✅ vendchain_contracts deployed"

      - name: Deploy vend_machine program
        working-directory: vendchain-contracts
        run: |
          anchor deploy \
            --program-name vend_machine \
            --provider.cluster devnet \
            --provider.wallet ~/.config/solana/id.json \
            --no-idl
          echo "✅ vend_machine deployed"

      - name: Update IDL on-chain
        continue-on-error: true
        working-directory: vendchain-contracts
        run: |
          anchor idl upgrade \
            --filepath target/idl/vendchain_contracts.json \
            --provider.cluster devnet \
            --provider.wallet ~/.config/solana/id.json \
            9T4YTDnoA1KQyVmcyEqJug5jWkXEjyi6WLw2uKr9kowK || true
          echo "✅ IDL step done (errors ignored)"

      - name: Copy new IDLs to frontend
        run: |
          cp vendchain-contracts/target/idl/vendchain_contracts.json \
             lib/idl/vendchain_contracts.json
          cp vendchain-contracts/target/idl/vend_machine.json \
             lib/idl/vend_machine.json
          echo "✅ Frontend IDLs updated"

      - name: Commit updated IDL
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/idl/vendchain_contracts.json
          git diff --staged --quiet || git commit -m "ci: update IDL after program deploy"
          git push || true
